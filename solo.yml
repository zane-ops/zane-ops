name: zane-ops
icon: images/logo.png
processes:
  dc logs api:
    command: docker compose -f ./docker/docker-compose.yaml logs -f zane-api
    working_dir: null
    auto_start: true
    auto_restart: false
    restart_when_changed: []
    env: {}
  api:
    command: make dev-api
    working_dir: null
    auto_start: true
    auto_restart: false
    restart_when_changed: []
    env: {}
  react router:
    command: pnpm run dev
    working_dir: ./frontend
    auto_start: true
    auto_restart: true
    restart_when_changed: []
    env: {}
